events {
    worker_connections 1024;
}

http {
    # Define a shared memory zone for rate limiting
    limit_req_zone $binary_remote_addr zone=apilimit:10m rate=10r/s;

    # Upstream group for api-v1 (Docker load-balances across the 3 replicas automatically)
    upstream api-v1-upstream {
        server api-v1:8000;
    }

    # Upstream group for api-v2 (Debug version)
    upstream api-v2-upstream {
        server api-v2:8000;
    }

    # Map the X-Experiment-Group header to dynamically select the backend
    map $http_x_experiment_group $api_backend {
        default        api-v1-upstream;
        "debug"        api-v2-upstream;
    }

    # Defining our http server
    server {
        listen 80;
        server_name localhost;

        # Redirects all HTTP requests to HTTPS
        return 301 https://$host$request_uri;
    }

    # Defining our new https server
    server {
        listen 443 ssl; # Listen on port 443 and enable SSL
        server_name localhost; # Domain name or IP that this server manages

        # Paths to SSL certificates inside the Nginx container
        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        ssl_protocols TLSv1.2 TLSv1.3; # Only allow modern versions of TLS
        ssl_ciphers HIGH:!aNULL:!MD5; # List of allowed cipher suites
        ssl_prefer_server_ciphers on; # Prefer server ciphers

        # Open health route to check backend responsiveness (No Authentication required)
        location /health {
            proxy_pass http://$api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Protected prediction endpoint
        location /predict {
            # Enforce rate limiting with the defined zone and a small burst allowance
            limit_req zone=apilimit burst=5 nodelay;

            auth_basic "API Access Protected"; # Message displayed to the user
            auth_basic_user_file /etc/nginx/.htpasswd; # Path to the .htpasswd file in the container

            # Route traffic dynamically based on the A/B testing header evaluation
            proxy_pass http://$api_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Experiment-Group $http_x_experiment_group;
        }

        # Status endpoint for the monitoring stack
        location /nginx_status {
            stub_status on;       # Enables the status module
            access_log off;       # Disables logs for this endpoint to save storage
            allow 127.0.0.1;      # Allows access from localhost
            allow 172.16.0.0/12;  # Allows access from the standard Docker bridge network spaces
            allow 192.168.0.0/16; # Backup allowance for wider local routing setups
            deny all;             # Blocks all other external access
        }
    }
}
